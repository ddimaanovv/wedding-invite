<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Background Animation</title>
  <style>
    :root {
      --bg-1: #fffafc;
      --bg-2: #f8eef4;
      --bg-3: #f4eefb;
      --rose: rgba(255, 182, 203, 0.28);
      --gold: rgba(244, 210, 120, 0.24);
      --lavender: rgba(205, 180, 255, 0.14);
      --text: #4d3b47;
      --shadow: rgba(122, 88, 107, 0.16);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(140deg, var(--bg-1), var(--bg-2) 46%, var(--bg-3));
    }

    body {
      position: relative;
      isolation: isolate;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
      opacity: 0.92;
    }

    .backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 52%, rgba(255,255,255,0.42) 0, rgba(255,255,255,0.2) 18%, rgba(255,255,255,0.06) 36%, transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01) 24%, rgba(255,255,255,0.05));
    }

    .gradient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(26px);
      opacity: 0.72;
      mix-blend-mode: screen;
      animation: floatOrb 18s ease-in-out infinite;
    }

    .orb-1 {
      width: 32vw;
      height: 32vw;
      min-width: 280px;
      min-height: 280px;
      left: -8vw;
      top: -8vw;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.82), var(--rose), transparent 72%);
      animation-delay: 0s;
    }

    .orb-2 {
      width: 28vw;
      height: 28vw;
      min-width: 240px;
      min-height: 240px;
      right: -6vw;
      top: 10vh;
      background: radial-gradient(circle at 45% 40%, rgba(255,255,255,0.76), var(--gold), transparent 72%);
      animation-duration: 26s;
      animation-delay: -5s;
    }

    .orb-3 {
      width: 36vw;
      height: 36vw;
      min-width: 320px;
      min-height: 320px;
      left: 25vw;
      bottom: -14vw;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.72), var(--lavender), transparent 68%);
      animation-duration: 30s;
      animation-delay: -9s;
    }

    .veil {
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 18% 24%, rgba(255,255,255,0.34), transparent 24%),
        radial-gradient(circle at 82% 18%, rgba(255,248,236,0.24), transparent 20%),
        radial-gradient(circle at 52% 74%, rgba(255,255,255,0.22), transparent 24%);
      filter: blur(20px);
      opacity: 0.52;
      animation: veilDrift 24s ease-in-out infinite alternate;
    }

    .sparkles {
      display: none;
    }

    .sparkles::before {
      content: "";
      position: absolute;
      inset: -8%;
      background:
        radial-gradient(circle at 14% 22%, rgba(255, 210, 120, 0.22), transparent 10%),
        radial-gradient(circle at 86% 18%, rgba(255, 210, 120, 0.18), transparent 9%),
        radial-gradient(circle at 78% 68%, rgba(255, 210, 120, 0.14), transparent 10%),
        radial-gradient(circle at 22% 78%, rgba(255,255,255,0.18), transparent 12%);
      filter: blur(16px);
      opacity: 0.56;
      animation: gildedGlow 8s ease-in-out infinite alternate;
    }

    .sparkles::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 18%, rgba(255,255,255,0.35), transparent 2.2%),
        radial-gradient(circle at 72% 26%, rgba(255,230,180,0.28), transparent 2%),
        radial-gradient(circle at 84% 58%, rgba(255,255,255,0.3), transparent 2.4%),
        radial-gradient(circle at 18% 66%, rgba(255,230,180,0.24), transparent 2.2%);
      opacity: 0.8;
      filter: blur(2px);
    }

    canvas#petals {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      opacity: 1;
      filter: drop-shadow(0 0 10px rgba(120,0,0,0.18));
    }

    .glints {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .twinkle-star {
      --size: 26px;
      --glow: rgba(255, 228, 170, 0.9);
      position: absolute;
      width: var(--size);
      height: var(--size);
      transform: translate(-50%, -50%) scale(0.7);
      opacity: 0;
      filter: drop-shadow(0 0 10px rgba(255, 220, 150, 0.45));
      animation: starPulse 3.8s ease-in-out infinite;
    }

    .twinkle-star::before,
    .twinkle-star::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.95), transparent);
    }

    .twinkle-star::before {
      width: 3px;
      height: 100%;
      box-shadow: 0 0 14px rgba(255, 225, 170, 0.42);
    }

    .twinkle-star::after {
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
      box-shadow: 0 0 14px rgba(255, 225, 170, 0.42);
    }

    .twinkle-core {
      position: absolute;
      inset: 50%;
      width: 8px;
      height: 8px;
      transform: translate(-50%, -50%) rotate(45deg);
      border-radius: 2px;
      background: radial-gradient(circle, rgba(255,255,255,1) 0 32%, rgba(255,235,190,0.95) 55%, rgba(255,220,150,0.4) 72%, transparent 100%);
      box-shadow:
        0 0 12px rgba(255,255,255,0.55),
        0 0 20px rgba(255, 222, 160, 0.45);
    }

    .twinkle-star.small { --size: 18px; }
    .twinkle-star.large { --size: 34px; }

    .twinkle-star:nth-child(1) { left: 12%; top: 16%; animation-delay: 0s; }
    .twinkle-star:nth-child(2) { left: 24%; top: 30%; animation-delay: 1.1s; }
    .twinkle-star:nth-child(3) { left: 38%; top: 14%; animation-delay: 2.2s; }
    .twinkle-star:nth-child(4) { left: 68%; top: 22%; animation-delay: 0.8s; }
    .twinkle-star:nth-child(5) { left: 84%; top: 16%; animation-delay: 2.7s; }
    .twinkle-star:nth-child(6) { left: 78%; top: 62%; animation-delay: 1.7s; }
    .twinkle-star:nth-child(7) { left: 18%; top: 72%; animation-delay: 3.1s; }
    .twinkle-star:nth-child(8) { left: 58%; top: 78%; animation-delay: 1.4s; }
    .twinkle-star:nth-child(9) { left: 90%; top: 42%; animation-delay: 2.9s; }
    .twinkle-star:nth-child(10) { left: 8%; top: 48%; animation-delay: 0.5s; }

    .content {
      position: relative;
      z-index: 6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      position: relative;
      overflow: hidden;
      width: min(92vw, 760px);
      padding: clamp(28px, 5vw, 56px);
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(22px) saturate(1.08);
      border: 1px solid rgba(255,255,255,0.82);
      box-shadow:
        0 18px 60px var(--shadow),
        0 4px 14px rgba(255,255,255,0.34),
        inset 0 1px 0 rgba(255,255,255,0.92);
      text-align: center;
      color: var(--text);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent 38%, transparent 62%, rgba(255,255,255,0.12));
      pointer-events: none;
    }

    .eyebrow {
      position: relative;
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(77, 59, 71, 0.64);
    }

    h1 {
      position: relative;
      margin: 0;
      font-size: clamp(40px, 9vw, 88px);
      line-height: 0.95;
      font-weight: 600;
      letter-spacing: -0.03em;
      text-shadow: 0 1px 0 rgba(255,255,255,0.55);
    }

    .amp {
      display: inline-block;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-weight: 400;
      opacity: 0.72;
      transform: translateY(-0.04em);
    }

    .date {
      position: relative;
      margin: 18px 0 0;
      font-size: clamp(16px, 2.3vw, 22px);
      color: rgba(77, 59, 71, 0.82);
    }

    .line {
      position: relative;
      width: 120px;
      max-width: 30vw;
      height: 1px;
      margin: 22px auto;
      background: linear-gradient(90deg, transparent, rgba(210, 171, 86, 0.76), transparent);
    }

    .caption {
      position: relative;
      margin: 0 auto;
      max-width: 42ch;
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1.7;
      color: rgba(77, 59, 71, 0.76);
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      25% { transform: translate3d(1.8vw, 2.4vh, 0) scale(1.03); }
      50% { transform: translate3d(-0.8vw, 4vh, 0) scale(0.985); }
      75% { transform: translate3d(2vw, 1vh, 0) scale(1.02); }
    }

    @keyframes veilDrift {
      0% { transform: translate3d(-1%, -1%, 0) scale(1); opacity: 0.42; }
      100% { transform: translate3d(1.4%, 0.8%, 0) scale(1.03); opacity: 0.58; }
    }

    @keyframes twinkle {
      0% { transform: translateY(0); opacity: 0.34; }
      50% { opacity: 0.54; }
      100% { transform: translateY(-8px); opacity: 0.42; }
    }

    @keyframes gildedGlow {
      0% { transform: scale(1) translate3d(0, 0, 0); opacity: 0.24; }
      100% { transform: scale(1.03) translate3d(0, -1%, 0); opacity: 0.38; }
    }

    @keyframes starPulse {
      0%, 100% {
        opacity: 0.12;
        transform: translate(-50%, -50%) scale(0.55) rotate(0deg);
        filter: drop-shadow(0 0 6px rgba(255, 220, 150, 0.2));
      }
      18% {
        opacity: 0.35;
        transform: translate(-50%, -50%) scale(0.82) rotate(8deg);
      }
      34% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.18) rotate(0deg);
        filter: drop-shadow(0 0 16px rgba(255, 220, 150, 0.55));
      }
      48% {
        opacity: 0.58;
        transform: translate(-50%, -50%) scale(0.88) rotate(-8deg);
      }
      70% {
        opacity: 0.2;
        transform: translate(-50%, -50%) scale(0.65) rotate(0deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .gradient-orb,
      .veil,
      .sparkles,
      .sparkles::before,
      .glints .twinkle-star {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="backdrop" aria-hidden="true">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
    <div class="veil"></div>
        <div class="glints" aria-hidden="true">
      <span class="twinkle-star large"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
      <span class="twinkle-star large"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
      <span class="twinkle-star large"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
    </div>
    <canvas id="petals"></canvas>
  </div>

  <main class="content">
    <section class="card">
      <p class="eyebrow">Wedding Invitation</p>
      <h1>София <span class="amp">&</span> Михаил</h1>
      <p class="date">12 июля 2026</p>
      <div class="line"></div>
      <p class="caption">
        Нежная фоновая анимация для свадебного сайта: мягкое свечение, мерцающие звёзды и плавно парящие лепестки.
      </p>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('petals');
    const ctx = canvas.getContext('2d');
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let petals = [];
    let animationFrame = 0;

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      createPetals();
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createPetals() {
      const count = Math.max(28, Math.min(56, Math.floor(w / 28)));
      petals = Array.from({ length: count }, (_, i) => ({
        x: random(0, w),
        y: random(-h, h),
        size: random(16, 34),
        speedY: random(0.45, 1.15),
        speedX: random(-0.22, 0.22),
        sway: random(0.0035, 0.01),
        drift: random(0.45, 1.05),
        angle: random(0, Math.PI * 2),
        rotate: random(-0.016, 0.016),
        alpha: random(0.68, 1),
        hue: i % 5,
        phase: random(0, Math.PI * 2),
        breathe: random(0.8, 1.5),
      }));
    }

    function petalColor(type, alpha) {
      switch (type) {
        case 0: return `rgba(255, 52, 52, ${alpha})`;
        case 1: return `rgba(220, 20, 60, ${alpha})`;
        case 2: return `rgba(255, 95, 95, ${alpha})`;
        case 3: return `rgba(185, 12, 45, ${alpha})`;
        default: return `rgba(255, 120, 120, ${alpha})`;
      }
    }

    function drawPetal(p, time) {
      const shimmer = 0.92 + Math.sin(time * p.breathe + p.phase) * 0.08;
      const alpha = Math.max(0.24, Math.min(0.82, p.alpha * shimmer));

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.scale(0.95, 1.28);
      ctx.shadowBlur = 16;
      ctx.shadowColor = `rgba(140, 0, 0, ${Math.min(alpha * 0.34, 0.28)})`;

      ctx.beginPath();
      ctx.moveTo(0, -p.size * 0.55);
      ctx.bezierCurveTo(
        p.size * 0.8, -p.size * 0.65,
        p.size * 0.95, p.size * 0.25,
        0, p.size
      );
      ctx.bezierCurveTo(
        -p.size * 0.95, p.size * 0.25,
        -p.size * 0.8, -p.size * 0.65,
        0, -p.size * 0.55
      );
      ctx.closePath();

      const gradient = ctx.createLinearGradient(-p.size, -p.size, p.size, p.size);
      gradient.addColorStop(0, 'rgba(255,255,255,0.1)');
      gradient.addColorStop(0.28, petalColor(p.hue, alpha));
      gradient.addColorStop(0.72, petalColor((p.hue + 1) % 5, Math.max(0.45, alpha - 0.08)));
      gradient.addColorStop(1, 'rgba(90,0,0,0.08)');
      ctx.fillStyle = gradient;
      ctx.fill();

      ctx.strokeStyle = `rgba(255, 235, 235, ${Math.min(alpha * 0.9, 0.82)})`;
      ctx.lineWidth = 0.75;
      ctx.beginPath();
      ctx.moveTo(0, -p.size * 0.35);
      ctx.quadraticCurveTo(0.4, 0, -0.4, p.size * 0.65);
      ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(-p.size * 0.16, -p.size * 0.18, p.size * 0.1, p.size * 0.16, -0.4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 230, 230, 0.18)';
      ctx.fill();

      ctx.restore();
    }

    function render() {
      ctx.clearRect(0, 0, w, h);
      const time = performance.now() * 0.001;

      for (const p of petals) {
        p.y += p.speedY;
        p.x += Math.sin(p.y * p.sway + p.phase + time * 0.35) * p.drift + p.speedX;
        p.angle += p.rotate;

        if (p.y > h + 40) {
          p.y = random(-120, -20);
          p.x = random(0, w);
        }
        if (p.x < -40) p.x = w + 40;
        if (p.x > w + 40) p.x = -40;

        drawPetal(p, time);
      }

      animationFrame = requestAnimationFrame(render);
    }

    resize();

    if (!prefersReducedMotion) {
      render();
    }

    window.addEventListener('resize', resize);
  </script>
</body>
</html>
