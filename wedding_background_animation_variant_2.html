<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Background Animation — Dark Luxury</title>
  <style>
    :root {
      --bg-0: #09070b;
      --bg-1: #120d14;
      --bg-2: #1a1017;
      --ink: #f7efe6;
      --muted: rgba(247, 239, 230, 0.72);
      --gold-1: rgba(244, 212, 149, 0.92);
      --gold-2: rgba(195, 143, 61, 0.7);
      --gold-soft: rgba(244, 212, 149, 0.18);
      --plum: rgba(110, 56, 84, 0.22);
      --wine: rgba(84, 20, 38, 0.18);
      --glass: rgba(16, 12, 17, 0.58);
      --glass-line: rgba(244, 212, 149, 0.22);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(58, 30, 48, 0.24), transparent 24%),
        radial-gradient(circle at 82% 20%, rgba(74, 41, 29, 0.18), transparent 20%),
        radial-gradient(circle at 50% 78%, rgba(44, 18, 34, 0.2), transparent 28%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1) 42%, var(--bg-2));
      color: var(--ink);
    }

    body {
      position: relative;
      isolation: isolate;
    }

    .scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 52%, rgba(255,255,255,0.03), transparent 26%),
        radial-gradient(circle at 50% 52%, rgba(244, 212, 149, 0.035), transparent 48%);
    }

    .velvet,
    .aurora {
      position: absolute;
      inset: -12%;
      filter: blur(34px);
      transform: translate3d(0, 0, 0);
    }

    .velvet {
      background:
        radial-gradient(circle at 18% 26%, rgba(94, 44, 68, 0.24), transparent 18%),
        radial-gradient(circle at 78% 16%, rgba(111, 73, 35, 0.14), transparent 16%),
        radial-gradient(circle at 72% 72%, rgba(52, 20, 38, 0.2), transparent 18%),
        radial-gradient(circle at 24% 82%, rgba(52, 25, 42, 0.16), transparent 18%);
      opacity: 0.9;
      animation: driftVelvet 18s ease-in-out infinite alternate;
    }

    .aurora {
      background:
        radial-gradient(ellipse at 28% 38%, rgba(244, 212, 149, 0.08), transparent 20%),
        radial-gradient(ellipse at 74% 48%, rgba(244, 212, 149, 0.07), transparent 18%),
        radial-gradient(ellipse at 52% 18%, rgba(132, 74, 102, 0.14), transparent 16%);
      opacity: 0.86;
      animation: driftAurora 22s ease-in-out infinite alternate;
    }

    .sweep {
      position: absolute;
      inset: -24%;
      background:
        linear-gradient(105deg,
          transparent 36%,
          rgba(255,255,255,0.015) 44%,
          rgba(244, 212, 149, 0.08) 49%,
          rgba(255,255,255,0.02) 54%,
          transparent 62%);
      filter: blur(8px);
      opacity: 0.8;
      transform: translateX(-28%) rotate(2deg);
      animation: lightSweep 10s ease-in-out infinite;
    }

    .gold-rings {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(244, 212, 149, 0.14);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 26px rgba(244, 212, 149, 0.04);
      opacity: 0.8;
      backdrop-filter: blur(1px);
    }

    .ring::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: conic-gradient(
        from 180deg,
        transparent 0deg,
        transparent 42deg,
        rgba(244, 212, 149, 0.34) 70deg,
        rgba(255,255,255,0.06) 92deg,
        transparent 118deg,
        transparent 220deg,
        rgba(244, 212, 149, 0.2) 250deg,
        transparent 286deg,
        transparent 360deg
      );
      -webkit-mask: radial-gradient(circle, transparent calc(50% - 1px), #000 calc(50% - 0px));
              mask: radial-gradient(circle, transparent calc(50% - 1px), #000 calc(50% - 0px));
      opacity: 0.92;
    }

    .ring.one {
      width: 440px;
      height: 440px;
      left: -90px;
      top: 56%;
      animation: ringFloatA 18s ease-in-out infinite;
    }

    .ring.two {
      width: 520px;
      height: 520px;
      right: -160px;
      top: -80px;
      animation: ringFloatB 22s ease-in-out infinite;
    }

    .ring.three {
      width: 300px;
      height: 300px;
      left: 58%;
      top: 62%;
      animation: ringFloatC 16s ease-in-out infinite;
    }

    .streaks {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    .streak {
      position: absolute;
      height: 1px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(244, 212, 149, 0.64), rgba(255,255,255,0.12), transparent);
      filter: blur(0.2px);
      opacity: 0.42;
      transform-origin: left center;
    }

    .streak::after {
      content: "";
      position: absolute;
      right: 18%;
      top: 50%;
      width: 30px;
      height: 3px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.55), rgba(244, 212, 149, 0.16), transparent 72%);
      filter: blur(2px);
    }

    .streak.a {
      width: 34vw;
      left: 8%;
      top: 28%;
      transform: rotate(-12deg);
      animation: shimmerA 9s ease-in-out infinite;
    }

    .streak.b {
      width: 26vw;
      right: 10%;
      top: 62%;
      transform: rotate(14deg);
      animation: shimmerB 11s ease-in-out infinite;
    }

    .streak.c {
      width: 18vw;
      left: 54%;
      top: 20%;
      transform: rotate(-24deg);
      animation: shimmerC 8s ease-in-out infinite;
    }

    .glints {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .twinkle-star {
      --size: 26px;
      position: absolute;
      width: var(--size);
      height: var(--size);
      transform: translate(-50%, -50%) scale(0.7);
      opacity: 0.08;
      filter: drop-shadow(0 0 10px rgba(244, 212, 149, 0.28));
      animation: starPulse 4.2s ease-in-out infinite;
    }

    .twinkle-star::before,
    .twinkle-star::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: linear-gradient(180deg, transparent, rgba(255,244,224,0.92), transparent);
    }

    .twinkle-star::before {
      width: 2px;
      height: 100%;
      box-shadow: 0 0 16px rgba(244, 212, 149, 0.24);
    }

    .twinkle-star::after {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,244,224,0.92), transparent);
      box-shadow: 0 0 16px rgba(244, 212, 149, 0.24);
    }

    .twinkle-core {
      position: absolute;
      inset: 50%;
      width: 8px;
      height: 8px;
      transform: translate(-50%, -50%) rotate(45deg);
      border-radius: 2px;
      background: radial-gradient(circle, rgba(255,255,255,0.96) 0 30%, rgba(244, 212, 149, 0.92) 58%, rgba(244, 212, 149, 0.18) 78%, transparent 100%);
      box-shadow:
        0 0 10px rgba(255,255,255,0.24),
        0 0 20px rgba(244, 212, 149, 0.22);
    }

    .twinkle-star.small { --size: 18px; }
    .twinkle-star.large { --size: 34px; }

    .twinkle-star:nth-child(1) { left: 16%; top: 16%; animation-delay: 0s; }
    .twinkle-star:nth-child(2) { left: 30%; top: 34%; animation-delay: 1.2s; }
    .twinkle-star:nth-child(3) { left: 74%; top: 20%; animation-delay: 2.3s; }
    .twinkle-star:nth-child(4) { left: 84%; top: 60%; animation-delay: 0.9s; }
    .twinkle-star:nth-child(5) { left: 22%; top: 74%; animation-delay: 2.8s; }
    .twinkle-star:nth-child(6) { left: 60%; top: 78%; animation-delay: 1.6s; }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at 50% 50%, transparent 0, transparent 28%, rgba(9,7,11,0.18) 62%, rgba(9,7,11,0.38) 100%),
        linear-gradient(180deg, rgba(255,255,255,0.01), transparent 20%, rgba(0,0,0,0.12));
    }

    .content {
      position: relative;
      z-index: 6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      position: relative;
      overflow: hidden;
      width: min(92vw, 760px);
      padding: clamp(30px, 5vw, 58px);
      border-radius: 30px;
      background:
        linear-gradient(145deg, rgba(22,16,24,0.82), rgba(13,10,15,0.66));
      backdrop-filter: blur(18px) saturate(1.04);
      border: 1px solid var(--glass-line);
      box-shadow:
        0 22px 80px rgba(0,0,0,0.42),
        0 0 0 1px rgba(255,255,255,0.02) inset,
        inset 0 1px 0 rgba(255,255,255,0.04);
      text-align: center;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.02), transparent 36%, transparent 64%, rgba(244, 212, 149, 0.03));
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      border: 1px solid rgba(244, 212, 149, 0.08);
      pointer-events: none;
    }

    .eyebrow {
      position: relative;
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(244, 212, 149, 0.72);
    }

    h1 {
      position: relative;
      margin: 0;
      font-size: clamp(40px, 9vw, 88px);
      line-height: 0.95;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--ink);
      text-shadow: 0 0 24px rgba(244, 212, 149, 0.05);
    }

    .amp {
      display: inline-block;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-weight: 400;
      opacity: 0.8;
      color: rgba(244, 212, 149, 0.84);
      transform: translateY(-0.04em);
    }

    .date {
      position: relative;
      margin: 18px 0 0;
      font-size: clamp(16px, 2.3vw, 22px);
      color: var(--muted);
    }

    .line {
      position: relative;
      width: 140px;
      max-width: 32vw;
      height: 1px;
      margin: 24px auto;
      background: linear-gradient(90deg, transparent, rgba(244, 212, 149, 0.88), transparent);
      box-shadow: 0 0 16px rgba(244, 212, 149, 0.16);
    }

    .caption {
      position: relative;
      margin: 0 auto;
      max-width: 42ch;
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1.7;
      color: rgba(247, 239, 230, 0.62);
    }

    @keyframes driftVelvet {
      0% { transform: translate3d(-1.5%, -1%, 0) scale(1); }
      100% { transform: translate3d(1.5%, 1.2%, 0) scale(1.04); }
    }

    @keyframes driftAurora {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      100% { transform: translate3d(-1.2%, 1.4%, 0) scale(1.03); }
    }

    @keyframes lightSweep {
      0%, 100% { transform: translateX(-28%) rotate(2deg); opacity: 0.48; }
      50% { transform: translateX(24%) rotate(2deg); opacity: 0.9; }
    }

    @keyframes ringFloatA {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.48; }
      50% { transform: translate3d(18px, -10px, 0) scale(1.04); opacity: 0.72; }
    }

    @keyframes ringFloatB {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.42; }
      50% { transform: translate3d(-20px, 14px, 0) scale(1.05); opacity: 0.68; }
    }

    @keyframes ringFloatC {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.34; }
      50% { transform: translate3d(-10px, -12px, 0) scale(1.06); opacity: 0.56; }
    }

    @keyframes shimmerA {
      0%, 100% { opacity: 0.16; transform: rotate(-12deg) scaleX(0.96); }
      50% { opacity: 0.52; transform: rotate(-12deg) scaleX(1.04); }
    }

    @keyframes shimmerB {
      0%, 100% { opacity: 0.14; transform: rotate(14deg) scaleX(0.94); }
      50% { opacity: 0.46; transform: rotate(14deg) scaleX(1.05); }
    }

    @keyframes shimmerC {
      0%, 100% { opacity: 0.1; transform: rotate(-24deg) scaleX(0.9); }
      50% { opacity: 0.42; transform: rotate(-24deg) scaleX(1.06); }
    }

    @keyframes starPulse {
      0%, 100% {
        opacity: 0.08;
        transform: translate(-50%, -50%) scale(0.56) rotate(0deg);
      }
      28% {
        opacity: 0.32;
        transform: translate(-50%, -50%) scale(0.9) rotate(8deg);
      }
      40% {
        opacity: 0.98;
        transform: translate(-50%, -50%) scale(1.2) rotate(0deg);
      }
      58% {
        opacity: 0.26;
        transform: translate(-50%, -50%) scale(0.74) rotate(-8deg);
      }
    }

    @media (max-width: 900px) {
      .ring.one { width: 300px; height: 300px; left: -60px; }
      .ring.two { width: 360px; height: 360px; right: -120px; }
      .ring.three { width: 220px; height: 220px; left: 54%; }
      .streak.a { width: 42vw; }
      .streak.b { width: 34vw; }
      .streak.c { width: 24vw; }
    }

    @media (prefers-reduced-motion: reduce) {
      .velvet,
      .aurora,
      .sweep,
      .ring,
      .streak,
      .twinkle-star {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="velvet"></div>
    <div class="aurora"></div>
    <div class="sweep"></div>

    <div class="gold-rings">
      <div class="ring one"></div>
      <div class="ring two"></div>
      <div class="ring three"></div>
    </div>

    <div class="streaks">
      <span class="streak a"></span>
      <span class="streak b"></span>
      <span class="streak c"></span>
    </div>

    <div class="glints">
      <span class="twinkle-star large"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
      <span class="twinkle-star large"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
    </div>

    <div class="vignette"></div>
  </div>

  <main class="content">
    <section class="card">
      <p class="eyebrow">Wedding Invitation</p>
      <h1>София <span class="amp">&</span> Михаил</h1>
      <p class="date">12 июля 2026</p>
      <div class="line"></div>
      <p class="caption">
        Тёмный luxury-фон: глубокая бархатная подложка, золотые световые кольца, деликатный световой проход и редкие премиальные блики.
      </p>
    </section>
  </main>
</body>
</html>
