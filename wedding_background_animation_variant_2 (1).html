<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Background Animation — Dark Luxury Refined</title>
  <style>
    :root {
      --bg-0: #050406;
      --bg-1: #0a080c;
      --bg-2: #120d12;
      --bg-3: #1a1217;
      --ink: #f5eee4;
      --muted: rgba(245, 238, 228, 0.68);
      --gold: rgba(233, 196, 122, 0.94);
      --gold-soft: rgba(233, 196, 122, 0.18);
      --gold-faint: rgba(233, 196, 122, 0.08);
      --glass: rgba(10, 8, 12, 0.72);
      --glass-deep: rgba(18, 13, 18, 0.9);
      --line: rgba(233, 196, 122, 0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(60, 24, 43, 0.12), transparent 22%),
        radial-gradient(circle at 82% 14%, rgba(94, 68, 34, 0.08), transparent 18%),
        radial-gradient(circle at 50% 78%, rgba(42, 18, 30, 0.1), transparent 26%),
        linear-gradient(150deg, var(--bg-0), var(--bg-1) 34%, var(--bg-2) 66%, var(--bg-3));
      color: var(--ink);
    }

    body {
      position: relative;
      isolation: isolate;
    }

    .scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,255,255,0.015), transparent 18%),
        radial-gradient(circle at 50% 52%, rgba(233, 196, 122, 0.02), transparent 42%);
    }

    .velvet {
      position: absolute;
      inset: -14%;
      background:
        radial-gradient(circle at 20% 26%, rgba(76, 28, 52, 0.14), transparent 18%),
        radial-gradient(circle at 78% 20%, rgba(98, 70, 34, 0.08), transparent 16%),
        radial-gradient(circle at 68% 76%, rgba(40, 16, 28, 0.12), transparent 18%),
        radial-gradient(circle at 24% 84%, rgba(44, 18, 34, 0.1), transparent 16%);
      filter: blur(40px);
      opacity: 0.9;
      animation: velvetDrift 24s ease-in-out infinite alternate;
    }


    .halo-arc {
      position: absolute;
      width: 72vw;
      height: 72vw;
      min-width: 720px;
      min-height: 720px;
      right: -30vw;
      top: -30vw;
      border-radius: 50%;
      border: 1px solid rgba(233, 196, 122, 0.08);
      box-shadow:
        0 0 40px rgba(233, 196, 122, 0.04),
        inset 0 0 0 1px rgba(255,255,255,0.01);
      opacity: 0.78;
      animation: arcFloat 26s ease-in-out infinite;
    }

    .halo-arc::before,
    .halo-arc::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      -webkit-mask: radial-gradient(circle, transparent calc(50% - 1px), #000 calc(50% - 0px));
              mask: radial-gradient(circle, transparent calc(50% - 1px), #000 calc(50% - 0px));
    }

    .halo-arc::before {
      background: conic-gradient(
        from 210deg,
        transparent 0deg,
        transparent 46deg,
        rgba(233, 196, 122, 0.24) 78deg,
        rgba(255,255,255,0.04) 94deg,
        transparent 112deg,
        transparent 254deg,
        rgba(233, 196, 122, 0.18) 286deg,
        transparent 316deg,
        transparent 360deg
      );
      opacity: 0.95;
    }

    .halo-arc::after {
      inset: 24px;
      border: 1px solid rgba(233, 196, 122, 0.04);
      box-shadow: 0 0 24px rgba(233, 196, 122, 0.02);
    }

    .frame-glow {
      position: absolute;
      inset: 7vh 6vw;
      border: 1px solid rgba(255,255,255,0.015);
      border-radius: 36px;
      opacity: 0.55;
      z-index: 1;
    }

    .frame-glow::before,
    .frame-glow::after {
      content: "";
      position: absolute;
      height: 1px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(233, 196, 122, 0.18), transparent);
      box-shadow: 0 0 12px rgba(233, 196, 122, 0.06);
    }

    .frame-glow::before {
      width: 180px;
      left: 32px;
      top: -1px;
    }

    .frame-glow::after {
      width: 140px;
      right: 32px;
      bottom: -1px;
    }

    .starfield {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0.86;
      background-image:
        radial-gradient(circle, rgba(255,248,236,0.95) 0 0.8px, transparent 1.2px),
        radial-gradient(circle, rgba(255,240,215,0.72) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255,255,255,0.56) 0 0.7px, transparent 1.1px),
        radial-gradient(circle, rgba(233, 196, 122, 0.46) 0 0.9px, transparent 1.4px);
      background-size: 120px 120px, 180px 180px, 260px 260px, 340px 340px;
      background-position: 0 0, 32px 54px, 90px 26px, 140px 110px;
      filter: drop-shadow(0 0 4px rgba(233, 196, 122, 0.06));
      animation: starfieldDrift 26s linear infinite;
    }

    .starfield::before,
    .starfield::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.75;
      background-image:
        radial-gradient(circle, rgba(255,248,236,0.75) 0 0.75px, transparent 1.1px),
        radial-gradient(circle, rgba(255,255,255,0.48) 0 0.65px, transparent 1px),
        radial-gradient(circle, rgba(233, 196, 122, 0.28) 0 0.8px, transparent 1.2px);
      background-size: 150px 150px, 230px 230px, 420px 420px;
      filter: blur(0.1px);
    }

    .starfield::before {
      background-position: 18px 22px, 76px 110px, 140px 60px;
      animation: starfieldDriftAlt 34s linear infinite reverse;
    }

    .starfield::after {
      background-position: 64px 90px, 120px 34px, 220px 160px;
      opacity: 0.52;
      animation: starfieldPulse 7.5s ease-in-out infinite alternate;
    }

    .glints {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .twinkle-star {
      --size: 22px;
      position: absolute;
      width: var(--size);
      height: var(--size);
      transform: translate(-50%, -50%) scale(0.62);
      opacity: 0.06;
      filter: drop-shadow(0 0 8px rgba(233, 196, 122, 0.16));
      animation: starPulse 5.4s ease-in-out infinite;
    }

    .twinkle-star::before,
    .twinkle-star::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: linear-gradient(180deg, transparent, rgba(255,245,228,0.92), transparent);
    }

    .twinkle-star::before {
      width: 2px;
      height: 100%;
      box-shadow: 0 0 12px rgba(233, 196, 122, 0.14);
    }

    .twinkle-star::after {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,245,228,0.92), transparent);
      box-shadow: 0 0 12px rgba(233, 196, 122, 0.14);
    }

    .twinkle-core {
      position: absolute;
      inset: 50%;
      width: 7px;
      height: 7px;
      transform: translate(-50%, -50%) rotate(45deg);
      border-radius: 2px;
      background: radial-gradient(circle, rgba(255,255,255,0.96) 0 26%, rgba(233, 196, 122, 0.88) 58%, rgba(233, 196, 122, 0.14) 78%, transparent 100%);
      box-shadow:
        0 0 8px rgba(255,255,255,0.14),
        0 0 16px rgba(233, 196, 122, 0.14);
    }

    .twinkle-star.small { --size: 16px; }
    .twinkle-star.large { --size: 28px; }

    .twinkle-star:nth-child(1) { left: 8%; top: 10%; animation-delay: 0s; }
    .twinkle-star:nth-child(2) { left: 16%; top: 18%; animation-delay: 0.8s; }
    .twinkle-star:nth-child(3) { left: 24%; top: 12%; animation-delay: 1.7s; }
    .twinkle-star:nth-child(4) { left: 32%; top: 22%; animation-delay: 2.6s; }
    .twinkle-star:nth-child(5) { left: 42%; top: 14%; animation-delay: 3.4s; }
    .twinkle-star:nth-child(6) { left: 52%; top: 10%; animation-delay: 1.3s; }
    .twinkle-star:nth-child(7) { left: 62%; top: 18%; animation-delay: 2.2s; }
    .twinkle-star:nth-child(8) { left: 72%; top: 12%; animation-delay: 0.5s; }
    .twinkle-star:nth-child(9) { left: 82%; top: 20%; animation-delay: 3.1s; }
    .twinkle-star:nth-child(10) { left: 92%; top: 14%; animation-delay: 1.9s; }
    .twinkle-star:nth-child(11) { left: 14%; top: 34%; animation-delay: 2.8s; }
    .twinkle-star:nth-child(12) { left: 28%; top: 42%; animation-delay: 0.9s; }
    .twinkle-star:nth-child(13) { left: 46%; top: 36%; animation-delay: 3.6s; }
    .twinkle-star:nth-child(14) { left: 64%; top: 44%; animation-delay: 1.4s; }
    .twinkle-star:nth-child(15) { left: 84%; top: 40%; animation-delay: 2.4s; }
    .twinkle-star:nth-child(16) { left: 10%; top: 62%; animation-delay: 0.4s; }
    .twinkle-star:nth-child(17) { left: 24%; top: 76%; animation-delay: 1.8s; }
    .twinkle-star:nth-child(18) { left: 48%; top: 84%; animation-delay: 2.9s; }
    .twinkle-star:nth-child(19) { left: 72%; top: 72%; animation-delay: 0.7s; }
    .twinkle-star:nth-child(20) { left: 90%; top: 64%; animation-delay: 3.3s; }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(circle at 50% 50%, transparent 0, transparent 24%, rgba(5,4,6,0.12) 56%, rgba(5,4,6,0.42) 100%),
        linear-gradient(180deg, rgba(255,255,255,0.008), transparent 18%, rgba(0,0,0,0.18));
    }

    .content {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .card {
      position: relative;
      overflow: hidden;
      width: min(90vw, 760px);
      padding: clamp(34px, 5vw, 64px);
      border-radius: 28px;
      background:
        linear-gradient(155deg, rgba(14, 10, 16, 0.9), rgba(9, 7, 11, 0.8) 54%, rgba(18, 13, 18, 0.92));
      backdrop-filter: blur(16px) saturate(1.02);
      border: 1px solid var(--line);
      box-shadow:
        0 28px 120px rgba(0,0,0,0.52),
        0 0 0 1px rgba(255,255,255,0.015) inset,
        inset 0 1px 0 rgba(255,255,255,0.03);
      text-align: center;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.015), transparent 34%, transparent 68%, rgba(233, 196, 122, 0.02));
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 20px;
      border: 1px solid rgba(233, 196, 122, 0.06);
      pointer-events: none;
    }

    .top-accent {
      position: absolute;
      left: 50%;
      top: 0;
      width: min(160px, 28vw);
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(233, 196, 122, 0.82), transparent);
      box-shadow: 0 0 18px rgba(233, 196, 122, 0.14);
      opacity: 0.9;
    }

    .eyebrow {
      position: relative;
      margin: 0 0 14px;
      font-size: 12px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(233, 196, 122, 0.74);
    }

    h1 {
      position: relative;
      margin: 0;
      font-size: clamp(42px, 9vw, 92px);
      line-height: 0.94;
      font-weight: 600;
      letter-spacing: -0.035em;
      color: var(--ink);
      text-shadow: 0 0 20px rgba(233, 196, 122, 0.03);
    }

    .amp {
      display: inline-block;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-weight: 400;
      opacity: 0.84;
      color: rgba(233, 196, 122, 0.9);
      transform: translateY(-0.05em);
    }

    .date {
      position: relative;
      margin: 18px 0 0;
      font-size: clamp(16px, 2.2vw, 21px);
      color: var(--muted);
    }

    .line {
      position: relative;
      width: 124px;
      max-width: 30vw;
      height: 1px;
      margin: 24px auto;
      background: linear-gradient(90deg, transparent, rgba(233, 196, 122, 0.82), transparent);
      box-shadow: 0 0 14px rgba(233, 196, 122, 0.08);
    }

    .caption {
      position: relative;
      margin: 0 auto;
      max-width: 40ch;
      font-size: clamp(14px, 1.9vw, 17px);
      line-height: 1.8;
      color: rgba(245, 238, 228, 0.56);
    }

    @keyframes velvetDrift {
      0% { transform: translate3d(-1%, -1%, 0) scale(1); }
      100% { transform: translate3d(1.2%, 1%, 0) scale(1.03); }
    }


    @keyframes arcFloat {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.58; }
      50% { transform: translate3d(-14px, 14px, 0) scale(1.03); opacity: 0.82; }
    }

    @keyframes starPulse {
      0%, 100% {
        opacity: 0.05;
        transform: translate(-50%, -50%) scale(0.56) rotate(0deg);
      }
      30% {
        opacity: 0.2;
        transform: translate(-50%, -50%) scale(0.84) rotate(8deg);
      }
      42% {
        opacity: 0.82;
        transform: translate(-50%, -50%) scale(1.08) rotate(0deg);
      }
      60% {
        opacity: 0.14;
        transform: translate(-50%, -50%) scale(0.68) rotate(-8deg);
      }
    }

    @keyframes starfieldDrift {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-24px, 18px, 0); }
    }

    @keyframes starfieldDriftAlt {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(18px, -22px, 0); }
    }

    @keyframes starfieldPulse {
      0% { opacity: 0.38; }
      100% { opacity: 0.62; }
    }

    @media (max-width: 900px) {
      .halo-arc {
        width: 110vw;
        height: 110vw;
        min-width: 0;
        min-height: 0;
        right: -44vw;
        top: -42vw;
      }

      .frame-glow {
        inset: 5vh 4vw;
        border-radius: 28px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .velvet,
      .halo-arc,
      .starfield,
      .starfield::before,
      .starfield::after,
      .twinkle-star {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="velvet"></div>
    <div class="frame-glow"></div>
    <div class="halo-arc"></div>

    <div class="starfield"></div>

    <div class="glints">
      <span class="twinkle-star large"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star large"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star large"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
      <span class="twinkle-star large"><span class="twinkle-core"></span></span>
      <span class="twinkle-star"><span class="twinkle-core"></span></span>
      <span class="twinkle-star small"><span class="twinkle-core"></span></span>
    </div>

    <div class="vignette"></div>
  </div>

  <main class="content">
    <section class="card">
      <span class="top-accent"></span>
      <p class="eyebrow">Black Tie Wedding</p>
      <h1>София <span class="amp">&</span> Михаил</h1>
      <p class="date">12 июля 2026</p>
      <div class="line"></div>
      <p class="caption">
        Более дорогая версия: сдержанный бархатный фон, звёздное небо по всей сцене, одна большая золотая дуга и строгая black-tie эстетика.
      </p>
    </section>
  </main>
</body>
</html>
